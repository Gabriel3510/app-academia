<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Workout Plan</title>
  <style>
    :root {
      --bg: #f4f6fb;
      --surface: #ffffff;
      --surface-soft: #f7f9ff;
      --text: #12131a;
      --muted: #61657a;
      --line: #e4e8f4;
      --primary: #114de5;
      --primary-strong: #0f38a9;
      --accent: #ff7a18;
      --glass: rgba(255, 255, 255, 0.82);
      --modal-overlay: rgba(18, 19, 26, 0.58);
      --card-shadow: 0 14px 40px rgba(17, 77, 229, 0.12);
      --radius-lg: 22px;
      --radius-md: 14px;
      --radius-sm: 10px;
    }

    html[data-theme="dark"] {
      --bg: #0d111d;
      --surface: #131a2b;
      --surface-soft: #0f1523;
      --text: #e9ecf6;
      --muted: #a1abc2;
      --line: #24314f;
      --primary: #81a5ff;
      --primary-strong: #a8c0ff;
      --accent: #ffab5f;
      --glass: rgba(19, 26, 43, 0.82);
      --modal-overlay: rgba(3, 6, 14, 0.78);
      --card-shadow: 0 16px 40px rgba(0, 0, 0, 0.45);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Poppins", "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 5% 0%, rgba(255, 122, 24, 0.18), transparent 30%),
        radial-gradient(circle at 95% 100%, rgba(17, 77, 229, 0.2), transparent 35%),
        var(--bg);
      min-height: 100vh;
      padding: 20px 14px 28px;
      transition: background 0.25s ease, color 0.25s ease;
    }

    body.modal-open {
      overflow: hidden;
    }

    .shell {
      width: min(520px, 100%);
      margin: 0 auto;
      display: grid;
      gap: 20px;
    }

    .progress-board {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      box-shadow: var(--card-shadow);
      padding: 14px;
      display: grid;
      gap: 10px;
      animation: cardIn 450ms ease both;
    }

    .progress-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .progress-title {
      display: grid;
      gap: 2px;
    }

    .progress-title strong {
      font-size: 0.95rem;
    }

    .progress-title span {
      font-size: 0.76rem;
      color: var(--muted);
    }

    .reset-btn {
      border: 1px solid var(--line);
      background: var(--surface-soft);
      color: var(--text);
      border-radius: 999px;
      font: inherit;
      font-size: 0.72rem;
      font-weight: 700;
      padding: 6px 10px;
      cursor: pointer;
    }

    .theme-toggle {
      border: none;
      border-radius: 999px;
      padding: 7px 12px;
      background: transparent;
      color: var(--muted);
      font: inherit;
      font-size: 0.76rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s ease, color 0.2s ease, transform 0.2s ease;
      min-width: 44px;
      line-height: 1;
    }

    .theme-toggle:hover {
      transform: translateY(-1px);
    }

    .theme-toggle.active {
      background: var(--primary);
      color: #ffffff;
    }

    .today-strip {
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      padding: 11px;
      background: linear-gradient(110deg, color-mix(in srgb, var(--primary) 14%, white), color-mix(in srgb, var(--accent) 12%, white));
      display: grid;
      gap: 8px;
    }

    html[data-theme="dark"] .today-strip {
      background: linear-gradient(110deg, color-mix(in srgb, var(--primary) 24%, #0f1523), color-mix(in srgb, var(--accent) 14%, #0f1523));
    }

    .today-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      flex-wrap: wrap;
    }

    .today-day {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.4px;
      text-transform: uppercase;
      color: var(--primary-strong);
    }

    .today-badge {
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 0.68rem;
      font-weight: 700;
      border: 1px solid color-mix(in srgb, var(--line) 75%, transparent);
      background: var(--surface);
      color: var(--text);
    }

    .today-title {
      font-size: 0.93rem;
      font-weight: 700;
    }

    .today-meta {
      font-size: 0.75rem;
      color: var(--muted);
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .progress-track {
      height: 10px;
      border-radius: 999px;
      overflow: hidden;
      background: color-mix(in srgb, var(--line) 65%, white);
      border: 1px solid color-mix(in srgb, var(--line) 80%, transparent);
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--accent), var(--primary));
      transition: width 260ms ease;
    }

    .progress-text {
      font-size: 0.76rem;
      color: var(--muted);
    }

    .days-tracker {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
    }

    .track-day {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--surface-soft);
      color: var(--text);
      padding: 8px 6px;
      display: grid;
      gap: 3px;
      justify-items: center;
      cursor: pointer;
      transition: transform 0.2s ease, border-color 0.2s ease;
      font: inherit;
    }

    .track-day:hover {
      transform: translateY(-2px);
    }

    .track-day[data-status="done"] {
      border-color: #1ea76b;
      background: #eafcf3;
      color: #0e673f;
    }

    .track-day[data-status="missed"] {
      border-color: #dd5050;
      background: #fff0f0;
      color: #973737;
    }

    .track-day[data-status="pending"] {
      border-style: dashed;
    }

    html[data-theme="dark"] .track-day[data-status="done"] {
      background: #153426;
      color: #aef5cf;
      border-color: #2f8e63;
    }

    html[data-theme="dark"] .track-day[data-status="missed"] {
      background: #3b2020;
      color: #ffb4b4;
      border-color: #a25454;
    }

    .track-day span {
      font-size: 0.67rem;
      font-weight: 700;
      letter-spacing: 0.3px;
      text-transform: uppercase;
    }

    .track-day strong {
      font-size: 0.88rem;
      line-height: 1;
    }

    .progress-summary {
      display: grid;
      gap: 5px;
      font-size: 0.75rem;
      color: var(--muted);
    }

    .topbar {
      position: sticky;
      top: 10px;
      z-index: 10;
      display: flex;
      gap: 14px;
      align-items: center;
      justify-content: space-between;
      background: var(--glass);
      backdrop-filter: blur(8px);
      border: 1px solid color-mix(in srgb, var(--line) 65%, transparent);
      box-shadow: var(--card-shadow);
      border-radius: var(--radius-lg);
      padding: 14px 16px;
    }

    .brand {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .brand h1 {
      font-size: clamp(1.15rem, 3vw, 1.8rem);
      line-height: 1;
      letter-spacing: 0.3px;
    }

    .brand p {
      color: var(--muted);
      font-size: clamp(0.72rem, 2vw, 0.86rem);
    }

    .controls {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .control-group {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.82rem;
      color: var(--muted);
      font-weight: 600;
    }

    .segmented {
      display: inline-flex;
      padding: 3px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: var(--surface);
      box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--line) 45%, transparent);
      gap: 3px;
    }

    .segment-btn {
      border: none;
      border-radius: 999px;
      padding: 7px 12px;
      background: transparent;
      color: var(--muted);
      font: inherit;
      font-size: 0.76rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s ease, color 0.2s ease, transform 0.2s ease;
    }

    .segment-btn.active {
      background: var(--primary);
      color: #ffffff;
    }

    .segment-btn:hover {
      transform: translateY(-1px);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 16px;
    }

    .day-card {
      grid-column: span 12;
      background: var(--surface);
      border-radius: var(--radius-lg);
      border: 1px solid var(--line);
      box-shadow: var(--card-shadow);
      overflow: hidden;
      animation: cardIn 450ms ease both;
    }

    .day-card[data-kind="cardio"] {
      --tone: #15a87f;
      --tone-soft: #ecfbf6;
    }

    .day-card[data-kind="push"] {
      --tone: #114de5;
      --tone-soft: #eef2ff;
    }

    .day-card[data-kind="pull"] {
      --tone: #7b41e3;
      --tone-soft: #f4f0ff;
    }

    .day-card[data-kind="legs"] {
      --tone: #ea5f19;
      --tone-soft: #fff3ec;
    }

    html[data-theme="dark"] .day-card[data-kind="cardio"] {
      --tone: #53dcb6;
      --tone-soft: #102b28;
    }

    html[data-theme="dark"] .day-card[data-kind="push"] {
      --tone: #84a8ff;
      --tone-soft: #1a2545;
    }

    html[data-theme="dark"] .day-card[data-kind="pull"] {
      --tone: #ba98ff;
      --tone-soft: #26193e;
    }

    html[data-theme="dark"] .day-card[data-kind="legs"] {
      --tone: #ffae74;
      --tone-soft: #3c2216;
    }

    .day-head {
      border-left: 4px solid var(--tone);
      background: linear-gradient(90deg, var(--tone-soft), color-mix(in srgb, var(--surface) 80%, transparent));
      padding: 16px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
    }

    .day-head-right {
      display: grid;
      justify-items: end;
      gap: 8px;
    }

    .day-progress-mini {
      font-size: 0.69rem;
      color: var(--muted);
      font-weight: 700;
      letter-spacing: 0.2px;
    }

    .complete-toggle {
      border: 1px solid var(--line);
      background: var(--surface);
      color: var(--text);
      border-radius: 999px;
      padding: 6px 11px;
      font: inherit;
      font-size: 0.7rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.18s ease, background 0.18s ease, color 0.18s ease;
    }

    .complete-toggle:hover {
      transform: translateY(-1px);
    }

    .complete-toggle.is-done {
      background: #16a168;
      border-color: #0d8954;
      color: #ffffff;
    }

    .day-title {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: clamp(0.95rem, 2.4vw, 1.2rem);
      text-transform: uppercase;
      letter-spacing: 1.2px;
      font-weight: 700;
    }

    .day-focus {
      color: var(--muted);
      font-size: 0.83rem;
      font-weight: 500;
    }

    .exercise-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(158px, 1fr));
      gap: 12px;
      padding: 14px;
      background: var(--surface-soft);
    }

    .exercise {
      display: flex;
      flex-direction: column;
      min-height: 100%;
      border-radius: var(--radius-md);
      border: 1px solid var(--line);
      overflow: hidden;
      background: var(--surface);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      cursor: zoom-in;
      position: relative;
    }

    .exercise.is-complete {
      border-color: color-mix(in srgb, #16a168 65%, var(--line));
      box-shadow: inset 0 0 0 1px color-mix(in srgb, #16a168 36%, transparent);
    }

    .exercise:hover,
    .exercise:focus-visible {
      transform: translateY(-3px);
      box-shadow: 0 10px 24px rgba(18, 19, 26, 0.16);
      outline: none;
    }

    .expand-hint {
      position: absolute;
      top: 7px;
      right: 7px;
      background: color-mix(in srgb, var(--surface) 55%, black);
      color: #ffffff;
      border-radius: 999px;
      font-size: 0.66rem;
      line-height: 1;
      padding: 5px 8px;
      z-index: 1;
      pointer-events: none;
      font-weight: 700;
      letter-spacing: 0.4px;
    }

    .exercise-media {
      width: 100%;
      aspect-ratio: 1 / 1;
      position: relative;
      background: #eef2ff;
    }

    html[data-theme="dark"] .exercise-media {
      background: #1a2640;
    }

    .exercise-media img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .fallback {
      display: none;
      position: absolute;
      inset: 0;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: var(--muted);
      font-size: 0.74rem;
      padding: 8px;
      background: #e8ecf8;
    }

    html[data-theme="dark"] .fallback {
      background: #1d2946;
    }

    .exercise-body {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 10px;
      flex: 1;
    }

    .exercise-actions {
      margin-top: auto;
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .variation-wrap {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-right: auto;
      min-width: 0;
    }

    .variation-wrap label {
      font-size: 0.62rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.35px;
    }

    .variation-select {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface-soft);
      color: var(--text);
      font: inherit;
      font-size: 0.67rem;
      font-weight: 600;
      padding: 4px 6px;
      max-width: 125px;
    }

    .item-toggle {
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--surface-soft);
      color: var(--text);
      font: inherit;
      font-size: 0.68rem;
      font-weight: 700;
      padding: 5px 10px;
      cursor: pointer;
    }

    .item-toggle.is-done {
      background: #16a168;
      border-color: #0d8954;
      color: #ffffff;
    }

    .exercise-name {
      font-size: 0.82rem;
      font-weight: 600;
      line-height: 1.35;
    }

    .exercise-meta {
      display: inline-flex;
      border-radius: 999px;
      align-self: flex-start;
      color: var(--tone);
      background: color-mix(in srgb, var(--tone) 11%, white);
      padding: 4px 10px;
      font-size: 0.72rem;
      font-weight: 700;
    }

    .exercise-note {
      display: inline-flex;
      border-radius: 8px;
      align-self: flex-start;
      color: var(--tone);
      border: 1px dashed color-mix(in srgb, var(--tone) 35%, white);
      padding: 2px 7px;
      font-size: 0.64rem;
      font-weight: 600;
    }

    html[data-theme="dark"] .exercise-meta {
      color: #f0f4ff;
      background: color-mix(in srgb, var(--tone) 24%, #0f1523);
    }

    html[data-theme="dark"] .exercise-note {
      color: #eef3ff;
      border-color: color-mix(in srgb, var(--tone) 54%, #0f1523);
      background: color-mix(in srgb, var(--tone) 14%, #0f1523);
    }

    .cardio-list {
      display: grid;
      gap: 10px;
      padding: 14px;
      background: var(--surface-soft);
    }

    .cardio-item {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 10px;
      padding: 12px;
      align-items: center;
    }

    .cardio-item.is-complete {
      border-color: color-mix(in srgb, #16a168 65%, var(--line));
      box-shadow: inset 0 0 0 1px color-mix(in srgb, #16a168 36%, transparent);
    }

    .cardio-title {
      font-size: 0.92rem;
      font-weight: 600;
    }

    .cardio-sub {
      margin-top: 2px;
      color: var(--muted);
      font-size: 0.74rem;
    }

    .duration {
      border-radius: 999px;
      color: var(--tone);
      background: color-mix(in srgb, var(--tone) 12%, white);
      padding: 6px 11px;
      font-size: 0.75rem;
      font-weight: 700;
      white-space: nowrap;
    }

    html[data-theme="dark"] .duration {
      color: #eff5ff;
      background: color-mix(in srgb, var(--tone) 28%, #0f1523);
    }

    .tip {
      margin: 0 14px 14px;
      padding: 10px 12px;
      border-radius: var(--radius-sm);
      border: 1px solid color-mix(in srgb, var(--tone) 30%, white);
      background: color-mix(in srgb, var(--tone) 12%, white);
      color: var(--text);
      font-size: 0.78rem;
      line-height: 1.45;
    }

    html[data-theme="dark"] .tip {
      border-color: color-mix(in srgb, var(--tone) 42%, #0f1523);
      background: color-mix(in srgb, var(--tone) 18%, #0f1523);
      color: #eaf1ff;
    }

    .footer {
      text-align: center;
      color: var(--muted);
      font-size: 0.76rem;
      padding: 8px 6px 2px;
      line-height: 1.7;
    }

    .preview-modal {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: var(--modal-overlay);
      padding: 16px;
      z-index: 30;
    }

    .preview-modal.open {
      display: flex;
    }

    .preview-card {
      width: min(860px, 100%);
      max-height: min(90vh, 860px);
      background: var(--surface);
      border-radius: var(--radius-lg);
      border: 1px solid var(--line);
      box-shadow: var(--card-shadow);
      overflow: hidden;
      display: grid;
      grid-template-rows: auto 1fr auto;
    }

    .preview-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
    }

    .preview-title {
      display: flex;
      flex-direction: column;
      gap: 3px;
      min-width: 0;
    }

    .preview-title strong {
      font-size: 0.96rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .preview-title span {
      color: var(--muted);
      font-size: 0.76rem;
    }

    .close-btn {
      border: 1px solid var(--line);
      background: var(--surface-soft);
      color: var(--text);
      border-radius: 999px;
      padding: 7px 12px;
      cursor: pointer;
      font: inherit;
      font-size: 0.76rem;
      font-weight: 700;
    }

    .preview-media {
      background: color-mix(in srgb, var(--surface-soft) 74%, black);
      display: grid;
      place-items: center;
      min-height: 260px;
    }

    .preview-media img {
      max-width: 100%;
      max-height: 72vh;
      width: auto;
      height: auto;
      object-fit: contain;
      display: block;
    }

    .preview-foot {
      padding: 10px 14px;
      font-size: 0.74rem;
      color: var(--muted);
      border-top: 1px solid var(--line);
    }

    @media (min-width: 920px) {
      .day-card[data-span="6"] {
        grid-column: span 6;
      }
    }

    @media (max-width: 640px) {
      .topbar {
        position: static;
        flex-direction: column;
        align-items: stretch;
      }

      .controls {
        justify-content: space-between;
      }

      .control-group {
        width: 100%;
        justify-content: space-between;
      }

      .days-tracker {
        grid-template-columns: repeat(5, minmax(0, 1fr));
      }

      .exercise-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .preview-card {
        max-height: 92vh;
      }

      .preview-media img {
        max-height: 58vh;
      }
    }

    @keyframes cardIn {
      from {
        transform: translateY(8px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div class="brand">
        <h1 id="appTitle"></h1>
        <p id="appSubtitle"></p>
      </div>

      <div class="controls">
        <div class="control-group">
          <span id="languageLabel"></span>
          <div class="segmented" role="group" aria-label="Language selector">
            <button class="segment-btn" type="button" data-lang="en">EN</button>
            <button class="segment-btn" type="button" data-lang="pt">PT</button>
          </div>
        </div>

        <div class="control-group">
          <span id="themeLabel"></span>
          <div class="segmented" role="group" aria-label="Theme toggle">
            <button class="theme-toggle" type="button" id="themeToggleBtn" aria-label="Toggle theme" title="Toggle theme">
              <span id="themeToggleIcon" aria-hidden="true">🌙</span>
            </button>
          </div>
        </div>
      </div>
    </header>

    <section class="progress-board" id="todaySection" aria-live="polite">
      <div class="today-strip">
        <div class="today-top">
          <p class="today-day" id="todayDayLabel"></p>
          <span class="today-badge" id="todayBadge"></span>
        </div>
        <p class="today-title" id="todayMainLine"></p>
        <div class="today-meta">
          <span id="todayFocusLine"></span>
          <span id="todayItemsLine"></span>
        </div>
      </div>
      <div class="progress-head">
        <div class="progress-title">

    function loadExerciseChoices() {
      try {
        const raw = localStorage.getItem("workout-exercise-choices-v1");
        if (!raw) {
          return {};
        }
        const parsed = JSON.parse(raw);
        return typeof parsed === "object" && parsed !== null ? parsed : {};
      } catch {
        return {};
      }
    }

    function saveExerciseChoices(choices) {
      localStorage.setItem("workout-exercise-choices-v1", JSON.stringify(choices));
    }

    function getExerciseSlotKey(dayKey, baseExerciseName) {
      return `${dayKey}:${baseExerciseName}`;
    }

    function getExerciseOptions(baseExercise) {
      return exerciseVariants[baseExercise.name] || [{ name: baseExercise.name, file: baseExercise.file }];
    }

    function resolveExerciseVariant(dayKey, baseExercise) {
      const options = getExerciseOptions(baseExercise);
      const slotKey = getExerciseSlotKey(dayKey, baseExercise.name);
      const storedChoice = exerciseChoices[slotKey];
      const found = options.find((option) => option.name === storedChoice);
      return found || options[0];
    }

    function setExerciseVariant(dayKey, baseExercise, variantName) {
      const slotKey = getExerciseSlotKey(dayKey, baseExercise.name);
      if (variantName === baseExercise.name) {
        delete exerciseChoices[slotKey];
      } else {
        exerciseChoices[slotKey] = variantName;
      }
      saveExerciseChoices(exerciseChoices);
      renderPlan(currentLanguage);
    }

    function getWeekStart(date = new Date()) {
      const start = new Date(date);
      start.setHours(0, 0, 0, 0);
      const weekday = start.getDay();
      const diff = weekday === 0 ? -6 : 1 - weekday;
      start.setDate(start.getDate() + diff);
      return start;
    }

    function getWeekKey() {
      return getWeekStart().toISOString().slice(0, 10);
    }

    function normalizeProgressState(rawState) {
      const normalized = {};
      if (!rawState || typeof rawState !== "object") {
        return normalized;
      }

      for (const [key, value] of Object.entries(rawState)) {
        if (value !== "done") {
          continue;
        }

        if (key.startsWith("day:") || key.startsWith("item:")) {
          normalized[key] = "done";
          continue;
        }

        if (weekDays.includes(key)) {
          normalized[`day:${key}`] = "done";
        }
      }

      return normalized;
    }

    function loadWeekProgress() {
      const key = getWeekKey();
      const raw = localStorage.getItem(`workout-progress-${key}`);
      if (!raw) {
        return {};
      }
      try {
        const parsed = JSON.parse(raw);
        return normalizeProgressState(parsed);
      } catch {
        return {};
      }
    }

    function saveWeekProgress() {
      localStorage.setItem(`workout-progress-${currentWeekKey}`, JSON.stringify(progressState));
    }

    function syncWeekProgress() {
      const liveWeek = getWeekKey();
      if (liveWeek !== currentWeekKey) {
        currentWeekKey = liveWeek;
        progressState = loadWeekProgress();
      }
    }

    function getTodayPlanKey() {
      return todayToPlan[new Date().getDay()] || null;
    }

    function getDayByKey(dayKey) {
      return planData.find((day) => day.key === dayKey) || null;
    }

    function getDayItemIds(day) {
      const ids = [];
      if (day.exercises) {
        for (const exercise of day.exercises) {
          ids.push(`exercise:${exercise.name}`);
        }
      }
      if (day.cardio) {
        for (let index = 0; index < day.cardio.length; index += 1) {
          ids.push(`cardio:${index}`);
        }
      }
      return ids;
    }

    function getItemProgressKey(dayKey, itemId) {
      return `item:${dayKey}:${itemId}`;
    }

    function isItemDone(dayKey, itemId) {
      return progressState[getItemProgressKey(dayKey, itemId)] === "done";
    }

    function isDayManualDone(dayKey) {
      return progressState[`day:${dayKey}`] === "done";
    }

    function isDayDone(dayKey) {
      if (isDayManualDone(dayKey)) {
        return true;
      }

      const day = getDayByKey(dayKey);
      if (!day) {
        return false;
      }

      const itemIds = getDayItemIds(day);
      if (!itemIds.length) {
        return false;
      }

      return itemIds.every((itemId) => isItemDone(dayKey, itemId));
    }

    function getDayProgressCount(dayKey) {
      const day = getDayByKey(dayKey);
      if (!day) {
        return { done: 0, total: 0 };
      }

      const itemIds = getDayItemIds(day);
      const done = itemIds.filter((itemId) => isItemDone(dayKey, itemId)).length;
      return { done, total: itemIds.length };
    }

    function getEffectiveStatus(dayKey) {
      if (isDayDone(dayKey)) {
        return "done";
      }

      const todayKey = getTodayPlanKey();
      const todayIndex = todayKey ? weekDays.indexOf(todayKey) : -1;
      const dayIndex = weekDays.indexOf(dayKey);

      if (todayIndex >= 0 && dayIndex < todayIndex) {
        return "missed";
      }

      return "pending";
    }

    function toggleDayDone(dayKey) {
      syncWeekProgress();
      const manualKey = `day:${dayKey}`;
      if (progressState[manualKey] === "done") {
        delete progressState[manualKey];
      } else {
        progressState[manualKey] = "done";
      }
      saveWeekProgress();
      renderPlan(currentLanguage);
    }

    function toggleItemDone(dayKey, itemId) {
      syncWeekProgress();
      const progressKey = getItemProgressKey(dayKey, itemId);
      if (progressState[progressKey] === "done") {
        delete progressState[progressKey];
      } else {
        progressState[progressKey] = "done";
      }
      saveWeekProgress();
      renderPlan(currentLanguage);
    }

    function dayListToText(dayList, t) {
      if (!dayList.length) {
        return t.noneLabel;
      }
      return dayList.map((key) => t.days[key]).join(", ");
    }

    function renderProgress(language) {
      syncWeekProgress();
      const t = translations[language];
      const doneDays = [];
      const missedDays = [];
      const pendingDays = [];

      daysTracker.innerHTML = "";

      for (const key of weekDays) {
        const status = getEffectiveStatus(key);
        if (status === "done") doneDays.push(key);
        if (status === "missed") missedDays.push(key);
        if (status === "pending") pendingDays.push(key);

        const dayBtn = document.createElement("button");
        dayBtn.type = "button";
        dayBtn.className = "track-day";
        dayBtn.dataset.status = status;
        dayBtn.innerHTML = `
          <span>${t.dayShort[key]}</span>
          <strong>${status === "done" ? "✓" : status === "missed" ? "✕" : "•"}</strong>
        `;
        dayBtn.setAttribute("aria-label", `${t.days[key]} - ${status}`);
        dayBtn.addEventListener("click", () => toggleDayDone(key));
        daysTracker.appendChild(dayBtn);
      }

      const completion = Math.round((doneDays.length / weekDays.length) * 100);
      weekProgressBar.style.width = `${completion}%`;
      weekProgressText.textContent = `${t.weekProgress}: ${doneDays.length}/${weekDays.length} (${completion}%)`;

      const todayKey = getTodayPlanKey();
      if (!todayKey) {
        todayStatus.textContent = t.todayRest;
        todayDayLabel.textContent = t.todayRestTitle;
        todayBadge.textContent = t.statusPending;
        todayMainLine.textContent = t.todayRest;
        todayFocusLine.textContent = `${t.todayFocusLabel}: -`;
        todayItemsLine.textContent = `${t.todayItemsLabel}: 0/0`;
      } else {
        const todayDay = getDayByKey(todayKey);
        const todayProgress = getDayProgressCount(todayKey);
        const todayState = getEffectiveStatus(todayKey);
        if (todayState === "done") {
          todayStatus.textContent = t.todayDone;
          todayBadge.textContent = t.statusDone;
        } else if (todayState === "missed") {
          todayStatus.textContent = t.todayMissed;
          todayBadge.textContent = t.statusMissed;
        } else {
          todayStatus.textContent = t.todayPending;
          todayBadge.textContent = t.statusPending;
        }

        todayDayLabel.textContent = t.days[todayKey];
        todayMainLine.textContent = todayStatus.textContent;
        todayFocusLine.textContent = `${t.todayFocusLabel}: ${t.focuses[todayDay.focusKey]}`;
        todayItemsLine.textContent = `${t.todayItemsLabel}: ${todayProgress.done}/${todayProgress.total}`;
      }

      doneDaysText.textContent = `${t.doneListLabel} ${dayListToText(doneDays, t)}`;
      missingDaysText.textContent = `${t.missedListLabel} ${dayListToText(missedDays, t)}`;
      pendingDaysText.textContent = `${t.pendingListLabel} ${dayListToText(pendingDays, t)}`;

      progressTitle.textContent = t.progressTitle;
      progressSubtitle.textContent = t.progressSubtitle;
      resetWeekBtn.textContent = t.resetWeek;
    }

    function setActiveButton(buttons, value, attr) {
      for (const button of buttons) {
        button.classList.toggle("active", button.getAttribute(attr) === value);
      }
    }

    function applyTheme(theme) {
      currentTheme = theme;
      document.documentElement.setAttribute("data-theme", theme);
      localStorage.setItem("workout-theme", theme);

      const t = translations[currentLanguage] || translations.en;
      const isDark = theme === "dark";
      themeToggleIcon.textContent = isDark ? "☀️" : "🌙";
      themeToggleBtn.setAttribute("aria-label", isDark ? t.themeToggleToLight : t.themeToggleToDark);
      themeToggleBtn.title = isDark ? t.themeToggleToLight : t.themeToggleToDark;
    }

    function openPreview(exercise, t) {
      previewExerciseName.textContent = t.exercises[exercise.name];
      previewExerciseSets.textContent = exercise.sets;
      previewImage.src = `gifs/${exercise.file}`;
      previewImage.alt = t.exercises[exercise.name];
      previewHint.textContent = t.previewHint;
      closePreviewBtn.textContent = t.closeLabel;

      previewModal.classList.add("open");
      previewModal.setAttribute("aria-hidden", "false");
      document.body.classList.add("modal-open");
    }

    function closePreview() {
      previewModal.classList.remove("open");
      previewModal.setAttribute("aria-hidden", "true");
      previewImage.src = "";
      document.body.classList.remove("modal-open");
    }

    function renderPlan(language) {
      currentLanguage = language;
      const t = translations[language];
      planRoot.innerHTML = "";

      document.documentElement.lang = language === "pt" ? "pt" : "en";
      document.title = t.title;
      document.getElementById("appTitle").textContent = t.title;
      document.getElementById("appSubtitle").textContent = t.subtitle;
      document.getElementById("languageLabel").textContent = t.languageLabel;
      document.getElementById("themeLabel").textContent = t.themeLabel;
      document.getElementById("footerLine1").textContent = t.footerLine1;
      document.getElementById("footerCredit").textContent = t.footerCredit;
      closePreviewBtn.textContent = t.closeLabel;
      previewHint.textContent = t.previewHint;
      renderProgress(language);
      applyTheme(currentTheme);

      for (const day of planData) {
        const dayCard = document.createElement("section");
        dayCard.className = "day-card";
        dayCard.dataset.kind = day.kind;
        dayCard.dataset.span = day.span;

        const head = document.createElement("header");
        head.className = "day-head";
        const dayStatus = getEffectiveStatus(day.key);
        const dayProgress = getDayProgressCount(day.key);

        head.innerHTML = `
          <div class="day-title"><span>${dayIcons[day.key]}</span><span>${t.days[day.key]}</span></div>
          <div class="day-head-right">
            <div class="day-focus">${t.focuses[day.focusKey]}</div>
            <div class="day-progress-mini">${dayProgress.done}/${dayProgress.total} ${t.dayItemsDone}</div>
            <button class="complete-toggle ${dayStatus === "done" ? "is-done" : ""}" type="button" data-day-key="${day.key}">
              ${dayStatus === "done" ? t.markUndo : t.markDone}
            </button>
          </div>
        `;
        dayCard.appendChild(head);

        const toggleBtn = head.querySelector("[data-day-key]");
        if (toggleBtn) {
          toggleBtn.addEventListener("click", () => toggleDayDone(day.key));
        }

        if (day.exercises) {
          const grid = document.createElement("div");
          grid.className = "exercise-grid";

          for (const exercise of day.exercises) {
            const itemId = `exercise:${exercise.name}`;
            const done = isItemDone(day.key, itemId);
            const selectedVariant = resolveExerciseVariant(day.key, exercise);
            const variantOptions = getExerciseOptions(exercise);
            const optionMarkup = variantOptions
              .map((option) => {
                const optionLabel = t.exercises[option.name] || option.name;
                const isSelected = option.name === selectedVariant.name ? "selected" : "";
                return `<option value="${option.name}" ${isSelected}>${optionLabel}</option>`;
              })
              .join("");
            const card = document.createElement("article");
            card.className = `exercise ${done ? "is-complete" : ""}`;
            card.tabIndex = 0;
            card.setAttribute("role", "button");
            card.setAttribute("aria-label", `${t.exercises[selectedVariant.name] || selectedVariant.name} - ${exercise.sets}`);

            card.innerHTML = `
              <span class="expand-hint">${t.zoomTag}</span>
              <div class="exercise-media">
                <img src="gifs/${selectedVariant.file}" alt="${t.exercises[selectedVariant.name] || selectedVariant.name}" onerror="showFallback(this)" />
                <div class="fallback">${t.fallback}</div>
              </div>
              <div class="exercise-body">
                <div class="exercise-name">${t.exercises[selectedVariant.name] || selectedVariant.name}</div>
                <div class="exercise-meta">${exercise.sets}</div>
                ${exercise.updated ? `<div class="exercise-note">${t.updatedTag}</div>` : ""}
                <div class="exercise-actions">
                  <div class="variation-wrap">
                    <label>${t.variationLabel}</label>
                    <select class="variation-select" data-variation-select="${itemId}">
                      ${optionMarkup}
                    </select>
                  </div>
                  <button class="item-toggle ${done ? "is-done" : ""}" type="button" data-toggle-item="${itemId}">
                    ${done ? t.markExerciseUndo : t.markExerciseDone}
                  </button>
                </div>
              </div>
            `;

            card.addEventListener("click", () => openPreview({ name: selectedVariant.name, sets: exercise.sets, file: selectedVariant.file }, t));
            card.addEventListener("keydown", (event) => {
              if (event.key === "Enter" || event.key === " ") {
                event.preventDefault();
                openPreview({ name: selectedVariant.name, sets: exercise.sets, file: selectedVariant.file }, t);
              }
            });

            const variationSelect = card.querySelector("[data-variation-select]");
            if (variationSelect) {
              variationSelect.addEventListener("click", (event) => {
                event.stopPropagation();
              });
              variationSelect.addEventListener("change", (event) => {
                event.stopPropagation();
                setExerciseVariant(day.key, exercise, variationSelect.value);
              });
            }

            const itemToggle = card.querySelector("[data-toggle-item]");
            if (itemToggle) {
              itemToggle.addEventListener("click", (event) => {
                event.stopPropagation();
                toggleItemDone(day.key, itemId);
              });
            }

            grid.appendChild(card);
          }

          dayCard.appendChild(grid);
        }

        if (day.cardio) {
          const list = document.createElement("div");
          list.className = "cardio-list";

          for (let index = 0; index < day.cardio.length; index += 1) {
            const item = day.cardio[index];
            const itemId = `cardio:${index}`;
            const done = isItemDone(day.key, itemId);
            const row = document.createElement("article");
            row.className = `cardio-item ${done ? "is-complete" : ""}`;
            row.innerHTML = `
              <div>
                <div class="cardio-title">${t.cardio[item.title]}</div>
                <div class="cardio-sub">${t.cardio[item.detail]}</div>
              </div>
              <div class="duration">${t.durations[item.duration]}</div>
              <button class="item-toggle ${done ? "is-done" : ""}" type="button" data-toggle-item="${itemId}">
                ${done ? t.markExerciseUndo : t.markExerciseDone}
              </button>
            `;

            const itemToggle = row.querySelector("[data-toggle-item]");
            if (itemToggle) {
              itemToggle.addEventListener("click", () => {
                toggleItemDone(day.key, itemId);
              });
            }
            list.appendChild(row);
          }

          dayCard.appendChild(list);
        }

        if (day.tipKey) {
          const tip = document.createElement("div");
          tip.className = "tip";
          tip.textContent = `${t.tipLabel}: ${t.tips[day.tipKey]}`;
          dayCard.appendChild(tip);
        }

        planRoot.appendChild(dayCard);
      }

      setActiveButton(languageButtons, language, "data-lang");
    }

    function showFallback(img) {
      img.style.display = "none";
      const fallback = img.parentElement.querySelector(".fallback");
      if (fallback) {
        fallback.style.display = "flex";
      }
    }

    for (const button of languageButtons) {
      button.addEventListener("click", () => {
        const language = button.getAttribute("data-lang");
        localStorage.setItem("workout-language", language);
        renderPlan(language);
      });
    }

    themeToggleBtn.addEventListener("click", () => {
      applyTheme(currentTheme === "dark" ? "light" : "dark");
    });

    closePreviewBtn.addEventListener("click", closePreview);

    resetWeekBtn.addEventListener("click", () => {
      const t = translations[currentLanguage];
      if (confirm(t.resetConfirm)) {
        progressState = {};
        saveWeekProgress();
        renderPlan(currentLanguage);
      }
    });

    previewModal.addEventListener("click", (event) => {
      if (event.target === previewModal) {
        closePreview();
      }
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && previewModal.classList.contains("open")) {
        closePreview();
      }
    });


    const storedLanguage = localStorage.getItem("workout-language");
    const initialLanguage = storedLanguage && translations[storedLanguage] ? storedLanguage : "en";

    const storedTheme = localStorage.getItem("workout-theme");
    const initialTheme = storedTheme === "dark" ? "dark" : "light";

    currentWeekKey = getWeekKey();
    progressState = loadWeekProgress();
    exerciseChoices = loadExerciseChoices();

    applyTheme(initialTheme);
    renderPlan(initialLanguage);
  </script>
</body>
</html>
