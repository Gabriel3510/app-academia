<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Workout Plan</title>
  <style>
    :root {
      --bg: #f4f6fb;
      --surface: #ffffff;
      --surface-soft: #f7f9ff;
      --text: #12131a;
      --muted: #61657a;
      --line: #e4e8f4;
      --primary: #114de5;
      --primary-strong: #0f38a9;
      --accent: #ff7a18;
      --glass: rgba(255, 255, 255, 0.82);
      --modal-overlay: rgba(18, 19, 26, 0.58);
      --card-shadow: 0 14px 40px rgba(17, 77, 229, 0.12);
      --radius-lg: 22px;
      --radius-md: 14px;
      --radius-sm: 10px;
    }

    html[data-theme="dark"] {
      --bg: #0d111d;
      --surface: #131a2b;
      --surface-soft: #0f1523;
      --text: #e9ecf6;
      --muted: #a1abc2;
      --line: #24314f;
      --primary: #81a5ff;
      --primary-strong: #a8c0ff;
      --accent: #ffab5f;
      --glass: rgba(19, 26, 43, 0.82);
      --modal-overlay: rgba(3, 6, 14, 0.78);
      --card-shadow: 0 16px 40px rgba(0, 0, 0, 0.45);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Poppins", "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 5% 0%, rgba(255, 122, 24, 0.18), transparent 30%),
        radial-gradient(circle at 95% 100%, rgba(17, 77, 229, 0.2), transparent 35%),
        var(--bg);
      min-height: 100vh;
      padding: 20px 14px 28px;
      transition: background 0.25s ease, color 0.25s ease;
    }

    body.modal-open {
      overflow: hidden;
    }

    .shell {
      width: min(1140px, 100%);
      margin: 0 auto;
      display: grid;
      gap: 20px;
    }

    .topbar {
      position: sticky;
      top: 10px;
      z-index: 10;
      display: flex;
      gap: 14px;
      align-items: center;
      justify-content: space-between;
      background: var(--glass);
      backdrop-filter: blur(8px);
      border: 1px solid color-mix(in srgb, var(--line) 65%, transparent);
      box-shadow: var(--card-shadow);
      border-radius: var(--radius-lg);
      padding: 14px 16px;
    }

    .brand {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .brand h1 {
      font-size: clamp(1.15rem, 3vw, 1.8rem);
      line-height: 1;
      letter-spacing: 0.3px;
    }

    .brand p {
      color: var(--muted);
      font-size: clamp(0.72rem, 2vw, 0.86rem);
    }

    .controls {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .control-group {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.82rem;
      color: var(--muted);
      font-weight: 600;
    }

    .segmented {
      display: inline-flex;
      padding: 3px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: var(--surface);
      box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--line) 45%, transparent);
      gap: 3px;
    }

    .segment-btn {
      border: none;
      border-radius: 999px;
      padding: 7px 12px;
      background: transparent;
      color: var(--muted);
      font: inherit;
      font-size: 0.76rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s ease, color 0.2s ease, transform 0.2s ease;
    }

    .segment-btn.active {
      background: var(--primary);
      color: #ffffff;
    }

    .segment-btn:hover {
      transform: translateY(-1px);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 16px;
    }

    .day-card {
      grid-column: span 12;
      background: var(--surface);
      border-radius: var(--radius-lg);
      border: 1px solid var(--line);
      box-shadow: var(--card-shadow);
      overflow: hidden;
      animation: cardIn 450ms ease both;
    }

    .day-card[data-kind="cardio"] {
      --tone: #15a87f;
      --tone-soft: #ecfbf6;
    }

    .day-card[data-kind="push"] {
      --tone: #114de5;
      --tone-soft: #eef2ff;
    }

    .day-card[data-kind="pull"] {
      --tone: #7b41e3;
      --tone-soft: #f4f0ff;
    }

    .day-card[data-kind="legs"] {
      --tone: #ea5f19;
      --tone-soft: #fff3ec;
    }

    html[data-theme="dark"] .day-card[data-kind="cardio"] {
      --tone: #53dcb6;
      --tone-soft: #102b28;
    }

    html[data-theme="dark"] .day-card[data-kind="push"] {
      --tone: #84a8ff;
      --tone-soft: #1a2545;
    }

    html[data-theme="dark"] .day-card[data-kind="pull"] {
      --tone: #ba98ff;
      --tone-soft: #26193e;
    }

    html[data-theme="dark"] .day-card[data-kind="legs"] {
      --tone: #ffae74;
      --tone-soft: #3c2216;
    }

    .day-head {
      border-left: 4px solid var(--tone);
      background: linear-gradient(90deg, var(--tone-soft), color-mix(in srgb, var(--surface) 80%, transparent));
      padding: 16px 18px;
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
    }

    .day-title {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: clamp(0.95rem, 2.4vw, 1.2rem);
      text-transform: uppercase;
      letter-spacing: 1.2px;
      font-weight: 700;
    }

    .day-focus {
      color: var(--muted);
      font-size: 0.83rem;
      font-weight: 500;
    }

    .exercise-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(158px, 1fr));
      gap: 12px;
      padding: 14px;
      background: var(--surface-soft);
    }

    .exercise {
      display: flex;
      flex-direction: column;
      min-height: 100%;
      border-radius: var(--radius-md);
      border: 1px solid var(--line);
      overflow: hidden;
      background: var(--surface);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      cursor: zoom-in;
      position: relative;
    }

    .exercise:hover,
    .exercise:focus-visible {
      transform: translateY(-3px);
      box-shadow: 0 10px 24px rgba(18, 19, 26, 0.16);
      outline: none;
    }

    .expand-hint {
      position: absolute;
      top: 7px;
      right: 7px;
      background: color-mix(in srgb, var(--surface) 55%, black);
      color: #ffffff;
      border-radius: 999px;
      font-size: 0.66rem;
      line-height: 1;
      padding: 5px 8px;
      z-index: 1;
      pointer-events: none;
      font-weight: 700;
      letter-spacing: 0.4px;
    }

    .exercise-media {
      width: 100%;
      aspect-ratio: 1 / 1;
      position: relative;
      background: #eef2ff;
    }

    html[data-theme="dark"] .exercise-media {
      background: #1a2640;
    }

    .exercise-media img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .fallback {
      display: none;
      position: absolute;
      inset: 0;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: var(--muted);
      font-size: 0.74rem;
      padding: 8px;
      background: #e8ecf8;
    }

    html[data-theme="dark"] .fallback {
      background: #1d2946;
    }

    .exercise-body {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 10px;
      flex: 1;
    }

    .exercise-name {
      font-size: 0.82rem;
      font-weight: 600;
      line-height: 1.35;
    }

    .exercise-meta {
      display: inline-flex;
      border-radius: 999px;
      align-self: flex-start;
      color: var(--tone);
      background: color-mix(in srgb, var(--tone) 11%, white);
      padding: 4px 10px;
      font-size: 0.72rem;
      font-weight: 700;
    }

    .exercise-note {
      display: inline-flex;
      border-radius: 8px;
      align-self: flex-start;
      color: var(--tone);
      border: 1px dashed color-mix(in srgb, var(--tone) 35%, white);
      padding: 2px 7px;
      font-size: 0.64rem;
      font-weight: 600;
    }

    html[data-theme="dark"] .exercise-meta {
      color: #f0f4ff;
      background: color-mix(in srgb, var(--tone) 24%, #0f1523);
    }

    html[data-theme="dark"] .exercise-note {
      color: #eef3ff;
      border-color: color-mix(in srgb, var(--tone) 54%, #0f1523);
      background: color-mix(in srgb, var(--tone) 14%, #0f1523);
    }

    .cardio-list {
      display: grid;
      gap: 10px;
      padding: 14px;
      background: var(--surface-soft);
    }

    .cardio-item {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      padding: 12px;
      align-items: center;
    }

    .cardio-title {
      font-size: 0.92rem;
      font-weight: 600;
    }

    .cardio-sub {
      margin-top: 2px;
      color: var(--muted);
      font-size: 0.74rem;
    }

    .duration {
      border-radius: 999px;
      color: var(--tone);
      background: color-mix(in srgb, var(--tone) 12%, white);
      padding: 6px 11px;
      font-size: 0.75rem;
      font-weight: 700;
      white-space: nowrap;
    }

    html[data-theme="dark"] .duration {
      color: #eff5ff;
      background: color-mix(in srgb, var(--tone) 28%, #0f1523);
    }

    .tip {
      margin: 0 14px 14px;
      padding: 10px 12px;
      border-radius: var(--radius-sm);
      border: 1px solid color-mix(in srgb, var(--tone) 30%, white);
      background: color-mix(in srgb, var(--tone) 12%, white);
      color: var(--text);
      font-size: 0.78rem;
      line-height: 1.45;
    }

    html[data-theme="dark"] .tip {
      border-color: color-mix(in srgb, var(--tone) 42%, #0f1523);
      background: color-mix(in srgb, var(--tone) 18%, #0f1523);
      color: #eaf1ff;
    }

    .footer {
      text-align: center;
      color: var(--muted);
      font-size: 0.76rem;
      padding: 8px 6px 2px;
      line-height: 1.7;
    }

    .preview-modal {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: var(--modal-overlay);
      padding: 16px;
      z-index: 30;
    }

    .preview-modal.open {
      display: flex;
    }

    .preview-card {
      width: min(860px, 100%);
      max-height: min(90vh, 860px);
      background: var(--surface);
      border-radius: var(--radius-lg);
      border: 1px solid var(--line);
      box-shadow: var(--card-shadow);
      overflow: hidden;
      display: grid;
      grid-template-rows: auto 1fr auto;
    }

    .preview-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
    }

    .preview-title {
      display: flex;
      flex-direction: column;
      gap: 3px;
      min-width: 0;
    }

    .preview-title strong {
      font-size: 0.96rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .preview-title span {
      color: var(--muted);
      font-size: 0.76rem;
    }

    .close-btn {
      border: 1px solid var(--line);
      background: var(--surface-soft);
      color: var(--text);
      border-radius: 999px;
      padding: 7px 12px;
      cursor: pointer;
      font: inherit;
      font-size: 0.76rem;
      font-weight: 700;
    }

    .preview-media {
      background: color-mix(in srgb, var(--surface-soft) 74%, black);
      display: grid;
      place-items: center;
      min-height: 260px;
    }

    .preview-media img {
      max-width: 100%;
      max-height: 72vh;
      width: auto;
      height: auto;
      object-fit: contain;
      display: block;
    }

    .preview-foot {
      padding: 10px 14px;
      font-size: 0.74rem;
      color: var(--muted);
      border-top: 1px solid var(--line);
    }

    @media (min-width: 920px) {
      .day-card[data-span="6"] {
        grid-column: span 6;
      }
    }

    @media (max-width: 640px) {
      .topbar {
        position: static;
        flex-direction: column;
        align-items: stretch;
      }

      .controls {
        justify-content: space-between;
      }

      .control-group {
        width: 100%;
        justify-content: space-between;
      }

      .exercise-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .preview-card {
        max-height: 92vh;
      }

      .preview-media img {
        max-height: 58vh;
      }
    }

    @keyframes cardIn {
      from {
        transform: translateY(8px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }
  </style>
</head>

  <div class="shell">
    <header class="topbar">

        <h1 id="appTitle"></h1>

      <div class="controls">

            <button class="segment-btn" type="button" data-lang="en">EN</button>
            <button class="segment-btn" type="button" data-lang="pt">PT</button>
          </div>
        </div>

        <div class="control-group">
          <span id="themeLabel"></span>
          <div class="segmented" role="group" aria-label="Theme selector">
            <button class="segment-btn" type="button" data-theme-choice="light">Light</button>
            <button class="segment-btn" type="button" data-theme-choice="dark">Dark</button>

        </div>
      </div>
    </header>

    <main class="grid" id="planRoot"></main>

    <footer class="footer">
      <p id="footerLine1"></p>
      <p id="footerLine2"></p>

  </div>

  <div class="preview-modal" id="previewModal" aria-hidden="true">
    <div class="preview-card" role="dialog" aria-modal="true" aria-labelledby="previewExerciseName">
      <div class="preview-head">
        <div class="preview-title">

        <button class="close-btn" id="closePreviewBtn" type="button"></button>
      </div>
      <div class="preview-media">
        <img id="previewImage" src="" alt="" />
      </div>
      <div class="preview-foot" id="previewHint"></div>

        tipKey: "friday",
        cardio: [
          { title: "treadmill", detail: "treadmillDetailFri", duration: "fortyFive" },
          { title: "altCardio", detail: "altCardioDetail", duration: "variable" }
        ]
      }
    ];

    const planRoot = document.getElementById("planRoot");
    const languageButtons = [...document.querySelectorAll("[data-lang]")];
    const themeButtons = [...document.querySelectorAll("[data-theme-choice]")];

    const previewModal = document.getElementById("previewModal");
    const previewImage = document.getElementById("previewImage");
    const previewExerciseName = document.getElementById("previewExerciseName");
    const previewExerciseSets = document.getElementById("previewExerciseSets");
    const closePreviewBtn = document.getElementById("closePreviewBtn");
    const previewHint = document.getElementById("previewHint");

    let currentLanguage = "en";
    let currentTheme = "light";

    function setActiveButton(buttons, value, attr) {
      for (const button of buttons) {
        button.classList.toggle("active", button.getAttribute(attr) === value);
      }
    }

    function applyTheme(theme) {
      currentTheme = theme;
      document.documentElement.setAttribute("data-theme", theme);
      localStorage.setItem("workout-theme", theme);
      setActiveButton(themeButtons, theme, "data-theme-choice");
    }

    function openPreview(exercise, t) {
      previewExerciseName.textContent = t.exercises[exercise.name];
      previewExerciseSets.textContent = exercise.sets;
      previewImage.src = `gifs/${exercise.file}`;
      previewImage.alt = t.exercises[exercise.name];
      previewHint.textContent = t.previewHint;
      closePreviewBtn.textContent = t.closeLabel;

      previewModal.classList.add("open");
      previewModal.setAttribute("aria-hidden", "false");
      document.body.classList.add("modal-open");
    }

    function closePreview() {
      previewModal.classList.remove("open");
      previewModal.setAttribute("aria-hidden", "true");
      previewImage.src = "";
      document.body.classList.remove("modal-open");
    }

    function renderPlan(language) {
      currentLanguage = language;
      const t = translations[language];
      planRoot.innerHTML = "";

      document.documentElement.lang = language === "pt" ? "pt" : "en";
      document.title = t.title;
      document.getElementById("appTitle").textContent = t.title;
      document.getElementById("appSubtitle").textContent = t.subtitle;
      document.getElementById("languageLabel").textContent = t.languageLabel;
      document.getElementById("themeLabel").textContent = t.themeLabel;
      document.getElementById("footerLine1").textContent = t.footerLine1;
      document.getElementById("footerLine2").textContent = t.footerLine2;
      themeButtons[0].textContent = t.themeLight;
      themeButtons[1].textContent = t.themeDark;
      closePreviewBtn.textContent = t.closeLabel;
      previewHint.textContent = t.previewHint;

      for (const day of planData) {
        const dayCard = document.createElement("section");
        dayCard.className = "day-card";
        dayCard.dataset.kind = day.kind;
        dayCard.dataset.span = day.span;

        const head = document.createElement("header");
        head.className = "day-head";
        head.innerHTML = `
          <div class="day-title"><span>${dayIcons[day.key]}</span><span>${t.days[day.key]}</span></div>
          <div class="day-focus">${t.focuses[day.focusKey]}</div>
        `;
        dayCard.appendChild(head);

        if (day.exercises) {
          const grid = document.createElement("div");
          grid.className = "exercise-grid";

          for (const exercise of day.exercises) {
            const card = document.createElement("article");
            card.className = "exercise";
            card.tabIndex = 0;
            card.setAttribute("role", "button");
            card.setAttribute("aria-label", `${t.exercises[exercise.name]} - ${exercise.sets}`);

            card.innerHTML = `
              <span class="expand-hint">${t.zoomTag}</span>
              <div class="exercise-media">
                <img src="gifs/${exercise.file}" alt="${t.exercises[exercise.name]}" onerror="showFallback(this)" />
                <div class="fallback">${t.fallback}</div>
              </div>
              <div class="exercise-body">
                <div class="exercise-name">${t.exercises[exercise.name]}</div>
                <div class="exercise-meta">${exercise.sets}</div>
                ${exercise.updated ? `<div class="exercise-note">${t.updatedTag}</div>` : ""}
              </div>
            `;

            card.addEventListener("click", () => openPreview(exercise, t));
            card.addEventListener("keydown", (event) => {
              if (event.key === "Enter" || event.key === " ") {
                event.preventDefault();
                openPreview(exercise, t);
              }
            });

            grid.appendChild(card);
          }

          dayCard.appendChild(grid);
        }

        if (day.cardio) {
          const list = document.createElement("div");
          list.className = "cardio-list";

          for (const item of day.cardio) {
            const row = document.createElement("article");
            row.className = "cardio-item";
            row.innerHTML = `
              <div>
                <div class="cardio-title">${t.cardio[item.title]}</div>
                <div class="cardio-sub">${t.cardio[item.detail]}</div>
              </div>
              <div class="duration">${t.durations[item.duration]}</div>
            `;
            list.appendChild(row);
          }

          dayCard.appendChild(list);
        }

        if (day.tipKey) {
          const tip = document.createElement("div");
          tip.className = "tip";
          tip.textContent = `${t.tipLabel}: ${t.tips[day.tipKey]}`;
          dayCard.appendChild(tip);
        }

        planRoot.appendChild(dayCard);
      }

      setActiveButton(languageButtons, language, "data-lang");
      setActiveButton(themeButtons, currentTheme, "data-theme-choice");
    }

    function showFallback(img) {
      img.style.display = "none";
      const fallback = img.parentElement.querySelector(".fallback");
      if (fallback) {
        fallback.style.display = "flex";
      }
    }

    for (const button of languageButtons) {
      button.addEventListener("click", () => {
        const language = button.getAttribute("data-lang");
        localStorage.setItem("workout-language", language);
        renderPlan(language);
      });
    }

    for (const button of themeButtons) {
      button.addEventListener("click", () => {
        const theme = button.getAttribute("data-theme-choice");
        applyTheme(theme);
      });
    }

    closePreviewBtn.addEventListener("click", closePreview);

    previewModal.addEventListener("click", (event) => {
      if (event.target === previewModal) {
        closePreview();
      }
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && previewModal.classList.contains("open")) {
        closePreview();
      }
    });

    const storedLanguage = localStorage.getItem("workout-language");
    const initialLanguage = storedLanguage && translations[storedLanguage] ? storedLanguage : "en";

    const storedTheme = localStorage.getItem("workout-theme");
    const initialTheme = storedTheme === "dark" ? "dark" : "light";

    applyTheme(initialTheme);
    renderPlan(initialLanguage);
  </script>
</body>
</html>
