      <div class="brand">
        <h1 id="appTitle"></h1>
        <p id="appSubtitle"></p>
      </div>

      <div class="controls">
        <div class="control-group">
          <span id="languageLabel"></span>
          <div class="segmented" role="group" aria-label="Language selector">
            <button class="segment-btn" type="button" data-lang="en">EN</button>
            <button class="segment-btn" type="button" data-lang="pt">PT</button>
          </div>
        </div>

        <div class="control-group">
          <span id="themeLabel"></span>
          <div class="segmented" role="group" aria-label="Theme toggle">
            <button class="theme-toggle" type="button" id="themeToggleBtn" aria-label="Toggle theme" title="Toggle theme">
              <span id="themeToggleIcon" aria-hidden="true">🌙</span>
            </button>
          </div>
        </div>
      </div>
    </header>

    <section class="progress-board" id="todaySection" aria-live="polite">
      <div class="today-strip">
        <div class="today-top">
          <p class="today-day" id="todayDayLabel"></p>
          <span class="today-badge" id="todayBadge"></span>
        </div>
        <p class="today-title" id="todayMainLine"></p>
        <div class="today-meta">
          <span id="todayFocusLine"></span>
          <span id="todayItemsLine"></span>
        </div>
      </div>
      <div class="progress-head">
        <div class="progress-title">
          <strong id="progressTitle"></strong>
          <span id="progressSubtitle"></span>
        </div>
        <button class="reset-btn" id="resetWeekBtn" type="button"></button>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="weekProgressBar"></div>
      </div>
      <p class="progress-text" id="weekProgressText"></p>
      <div class="days-tracker" id="daysTracker"></div>
      <div class="progress-summary">
        <p id="todayStatus"></p>
        <p id="doneDaysText"></p>
        <p id="missingDaysText"></p>
        <p id="pendingDaysText"></p>
      </div>
    </section>

    <main class="grid" id="planRoot"></main>

    <footer class="footer" id="aboutSection">
      <p id="footerLine1"></p>
      <p id="footerCredit"></p>
    </footer>
  </div>

  <div class="preview-modal" id="previewModal" aria-hidden="true">
    <div class="preview-card" role="dialog" aria-modal="true" aria-labelledby="previewExerciseName">
      <div class="preview-head">
        <div class="preview-title">
          <strong id="previewExerciseName"></strong>

      <div class="preview-media">
        <img id="previewImage" src="" alt="" />
      </div>
      <div class="preview-foot" id="previewHint"></div>
    </div>
  </div>

    function loadExerciseChoices() {
      try {
        const raw = localStorage.getItem("workout-exercise-choices-v1");
        if (!raw) {
          return {};
        }
        const parsed = JSON.parse(raw);
        return typeof parsed === "object" && parsed !== null ? parsed : {};
      } catch {
        return {};
      }
    }

    function saveExerciseChoices(choices) {
      localStorage.setItem("workout-exercise-choices-v1", JSON.stringify(choices));
    }

    function getExerciseSlotKey(dayKey, baseExerciseName) {
      return `${dayKey}:${baseExerciseName}`;
    }

    function getExerciseOptions(baseExercise) {
      return exerciseVariants[baseExercise.name] || [{ name: baseExercise.name, file: baseExercise.file }];
    }

    function resolveExerciseVariant(dayKey, baseExercise) {
      const options = getExerciseOptions(baseExercise);
      const slotKey = getExerciseSlotKey(dayKey, baseExercise.name);
      const storedChoice = exerciseChoices[slotKey];
      const found = options.find((option) => option.name === storedChoice);
      return found || options[0];
    }

    function setExerciseVariant(dayKey, baseExercise, variantName) {
      const slotKey = getExerciseSlotKey(dayKey, baseExercise.name);
      if (variantName === baseExercise.name) {
        delete exerciseChoices[slotKey];
      } else {
        exerciseChoices[slotKey] = variantName;
      }
      saveExerciseChoices(exerciseChoices);
      renderPlan(currentLanguage);
    }

    function getWeekStart(date = new Date()) {
      const start = new Date(date);
      start.setHours(0, 0, 0, 0);
      const weekday = start.getDay();
      const diff = weekday === 0 ? -6 : 1 - weekday;
      start.setDate(start.getDate() + diff);
      return start;
    }

    function getWeekKey() {
      return getWeekStart().toISOString().slice(0, 10);
    }

    function normalizeProgressState(rawState) {
      const normalized = {};
      if (!rawState || typeof rawState !== "object") {
        return normalized;
      }

      for (const [key, value] of Object.entries(rawState)) {
        if (value !== "done") {
          continue;
        }

        if (key.startsWith("day:") || key.startsWith("item:")) {
          normalized[key] = "done";
          continue;
        }

        if (weekDays.includes(key)) {
          normalized[`day:${key}`] = "done";
        }
      }

      return normalized;
    }

    function loadWeekProgress() {
      const key = getWeekKey();
      const raw = localStorage.getItem(`workout-progress-${key}`);
      if (!raw) {
        return {};
      }
      try {
        const parsed = JSON.parse(raw);
        return normalizeProgressState(parsed);
      } catch {
        return {};
      }
    }

    function saveWeekProgress() {
      localStorage.setItem(`workout-progress-${currentWeekKey}`, JSON.stringify(progressState));
    }

    function syncWeekProgress() {
      const liveWeek = getWeekKey();
      if (liveWeek !== currentWeekKey) {
        currentWeekKey = liveWeek;
        progressState = loadWeekProgress();
      }
    }

    function getTodayPlanKey() {
      return todayToPlan[new Date().getDay()] || null;
    }

    function getDayByKey(dayKey) {
      return planData.find((day) => day.key === dayKey) || null;
    }

    function getDayItemIds(day) {
      const ids = [];
      if (day.exercises) {
        for (const exercise of day.exercises) {
          ids.push(`exercise:${exercise.name}`);
        }
      }
      if (day.cardio) {
        for (let index = 0; index < day.cardio.length; index += 1) {
          ids.push(`cardio:${index}`);
        }
      }
      return ids;
    }

    function getItemProgressKey(dayKey, itemId) {
      return `item:${dayKey}:${itemId}`;
    }

    function isItemDone(dayKey, itemId) {
      return progressState[getItemProgressKey(dayKey, itemId)] === "done";
    }

    function isDayManualDone(dayKey) {
      return progressState[`day:${dayKey}`] === "done";
    }

    function isDayDone(dayKey) {
      if (isDayManualDone(dayKey)) {
        return true;
      }

      const day = getDayByKey(dayKey);
      if (!day) {
        return false;
      }

      const itemIds = getDayItemIds(day);
      if (!itemIds.length) {
        return false;
      }

      return itemIds.every((itemId) => isItemDone(dayKey, itemId));
    }

    function getDayProgressCount(dayKey) {
      const day = getDayByKey(dayKey);
      if (!day) {
        return { done: 0, total: 0 };
      }

      const itemIds = getDayItemIds(day);
      const done = itemIds.filter((itemId) => isItemDone(dayKey, itemId)).length;
      return { done, total: itemIds.length };
    }

    function getEffectiveStatus(dayKey) {
      if (isDayDone(dayKey)) {
        return "done";
      }

      const todayKey = getTodayPlanKey();
      const todayIndex = todayKey ? weekDays.indexOf(todayKey) : -1;
      const dayIndex = weekDays.indexOf(dayKey);

      if (todayIndex >= 0 && dayIndex < todayIndex) {
        return "missed";
      }

      return "pending";
    }

    function toggleDayDone(dayKey) {
      syncWeekProgress();
      const manualKey = `day:${dayKey}`;
      if (progressState[manualKey] === "done") {
        delete progressState[manualKey];
      } else {
        progressState[manualKey] = "done";
      }
      saveWeekProgress();
      renderPlan(currentLanguage);
    }

    function toggleItemDone(dayKey, itemId) {
      syncWeekProgress();
      const progressKey = getItemProgressKey(dayKey, itemId);
      if (progressState[progressKey] === "done") {
        delete progressState[progressKey];
      } else {
        progressState[progressKey] = "done";
      }
      saveWeekProgress();
      renderPlan(currentLanguage);
    }

    function dayListToText(dayList, t) {
      if (!dayList.length) {
        return t.noneLabel;
      }
      return dayList.map((key) => t.days[key]).join(", ");
    }

    function renderProgress(language) {
      syncWeekProgress();
      const t = translations[language];
      const doneDays = [];
      const missedDays = [];
      const pendingDays = [];

      daysTracker.innerHTML = "";

      for (const key of weekDays) {
        const status = getEffectiveStatus(key);
        if (status === "done") doneDays.push(key);
        if (status === "missed") missedDays.push(key);
        if (status === "pending") pendingDays.push(key);

        const dayBtn = document.createElement("button");
        dayBtn.type = "button";
        dayBtn.className = "track-day";
        dayBtn.dataset.status = status;
        dayBtn.innerHTML = `
          <span>${t.dayShort[key]}</span>
          <strong>${status === "done" ? "✓" : status === "missed" ? "✕" : "•"}</strong>
        `;
        dayBtn.setAttribute("aria-label", `${t.days[key]} - ${status}`);
        dayBtn.addEventListener("click", () => toggleDayDone(key));
        daysTracker.appendChild(dayBtn);
      }

      const completion = Math.round((doneDays.length / weekDays.length) * 100);
      weekProgressBar.style.width = `${completion}%`;
      weekProgressText.textContent = `${t.weekProgress}: ${doneDays.length}/${weekDays.length} (${completion}%)`;

      const todayKey = getTodayPlanKey();
      if (!todayKey) {
        todayStatus.textContent = t.todayRest;
        todayDayLabel.textContent = t.todayRestTitle;
        todayBadge.textContent = t.statusPending;
        todayMainLine.textContent = t.todayRest;
        todayFocusLine.textContent = `${t.todayFocusLabel}: -`;
        todayItemsLine.textContent = `${t.todayItemsLabel}: 0/0`;
      } else {
        const todayDay = getDayByKey(todayKey);
        const todayProgress = getDayProgressCount(todayKey);
        const todayState = getEffectiveStatus(todayKey);
        if (todayState === "done") {
          todayStatus.textContent = t.todayDone;
          todayBadge.textContent = t.statusDone;
        } else if (todayState === "missed") {
          todayStatus.textContent = t.todayMissed;
          todayBadge.textContent = t.statusMissed;
        } else {
          todayStatus.textContent = t.todayPending;
          todayBadge.textContent = t.statusPending;
        }

        todayDayLabel.textContent = t.days[todayKey];
        todayMainLine.textContent = todayStatus.textContent;
        todayFocusLine.textContent = `${t.todayFocusLabel}: ${t.focuses[todayDay.focusKey]}`;
        todayItemsLine.textContent = `${t.todayItemsLabel}: ${todayProgress.done}/${todayProgress.total}`;
      }

      doneDaysText.textContent = `${t.doneListLabel} ${dayListToText(doneDays, t)}`;
      missingDaysText.textContent = `${t.missedListLabel} ${dayListToText(missedDays, t)}`;
      pendingDaysText.textContent = `${t.pendingListLabel} ${dayListToText(pendingDays, t)}`;

      progressTitle.textContent = t.progressTitle;
      progressSubtitle.textContent = t.progressSubtitle;
      resetWeekBtn.textContent = t.resetWeek;
    }

    function setActiveButton(buttons, value, attr) {
      for (const button of buttons) {
        button.classList.toggle("active", button.getAttribute(attr) === value);
      }
    }

    function applyTheme(theme) {
      currentTheme = theme;
      document.documentElement.setAttribute("data-theme", theme);
      localStorage.setItem("workout-theme", theme);

      const t = translations[currentLanguage] || translations.en;
      const isDark = theme === "dark";
      themeToggleIcon.textContent = isDark ? "☀️" : "🌙";
      themeToggleBtn.setAttribute("aria-label", isDark ? t.themeToggleToLight : t.themeToggleToDark);
      themeToggleBtn.title = isDark ? t.themeToggleToLight : t.themeToggleToDark;
    }

    function openPreview(exercise, t) {
      previewExerciseName.textContent = t.exercises[exercise.name];
      previewExerciseSets.textContent = exercise.sets;
      previewImage.src = `gifs/${exercise.file}`;
      previewImage.alt = t.exercises[exercise.name];
      previewHint.textContent = t.previewHint;
      closePreviewBtn.textContent = t.closeLabel;

      previewModal.classList.add("open");
      previewModal.setAttribute("aria-hidden", "false");
      document.body.classList.add("modal-open");
    }

    function closePreview() {
      previewModal.classList.remove("open");
      previewModal.setAttribute("aria-hidden", "true");
      previewImage.src = "";
      document.body.classList.remove("modal-open");
    }

    function renderPlan(language) {
      currentLanguage = language;
      const t = translations[language];
      planRoot.innerHTML = "";

      document.documentElement.lang = language === "pt" ? "pt" : "en";
      document.title = t.title;
      document.getElementById("appTitle").textContent = t.title;
      document.getElementById("appSubtitle").textContent = t.subtitle;
      document.getElementById("languageLabel").textContent = t.languageLabel;
      document.getElementById("themeLabel").textContent = t.themeLabel;
      document.getElementById("footerLine1").textContent = t.footerLine1;
      document.getElementById("footerCredit").textContent = t.footerCredit;
      closePreviewBtn.textContent = t.closeLabel;
      previewHint.textContent = t.previewHint;
      renderProgress(language);
      applyTheme(currentTheme);

      for (const day of planData) {
        const dayCard = document.createElement("section");
        dayCard.className = "day-card";
        dayCard.dataset.kind = day.kind;
        dayCard.dataset.span = day.span;

        const head = document.createElement("header");
        head.className = "day-head";
        const dayStatus = getEffectiveStatus(day.key);
        const dayProgress = getDayProgressCount(day.key);

        head.innerHTML = `
          <div class="day-title"><span>${dayIcons[day.key]}</span><span>${t.days[day.key]}</span></div>
          <div class="day-head-right">
            <div class="day-focus">${t.focuses[day.focusKey]}</div>
            <div class="day-progress-mini">${dayProgress.done}/${dayProgress.total} ${t.dayItemsDone}</div>
            <button class="complete-toggle ${dayStatus === "done" ? "is-done" : ""}" type="button" data-day-key="${day.key}">
              ${dayStatus === "done" ? t.markUndo : t.markDone}
            </button>
          </div>
        `;
        dayCard.appendChild(head);

        const toggleBtn = head.querySelector("[data-day-key]");
        if (toggleBtn) {
          toggleBtn.addEventListener("click", () => toggleDayDone(day.key));
        }

        if (day.exercises) {
          const grid = document.createElement("div");
          grid.className = "exercise-grid";

          for (const exercise of day.exercises) {
            const itemId = `exercise:${exercise.name}`;
            const done = isItemDone(day.key, itemId);
            const selectedVariant = resolveExerciseVariant(day.key, exercise);
            const variantOptions = getExerciseOptions(exercise);
            const optionMarkup = variantOptions
              .map((option) => {
                const optionLabel = t.exercises[option.name] || option.name;
                const isSelected = option.name === selectedVariant.name ? "selected" : "";
                return `<option value="${option.name}" ${isSelected}>${optionLabel}</option>`;
              })
              .join("");
            const card = document.createElement("article");
            card.className = `exercise ${done ? "is-complete" : ""}`;
            card.tabIndex = 0;
            card.setAttribute("role", "button");
            card.setAttribute("aria-label", `${t.exercises[selectedVariant.name] || selectedVariant.name} - ${exercise.sets}`);

            card.innerHTML = `
              <span class="expand-hint">${t.zoomTag}</span>
              <div class="exercise-media">
                <img src="gifs/${selectedVariant.file}" alt="${t.exercises[selectedVariant.name] || selectedVariant.name}" onerror="showFallback(this)" />
                <div class="fallback">${t.fallback}</div>
              </div>
              <div class="exercise-body">
                <div class="exercise-name">${t.exercises[selectedVariant.name] || selectedVariant.name}</div>
                <div class="exercise-meta">${exercise.sets}</div>
                ${exercise.updated ? `<div class="exercise-note">${t.updatedTag}</div>` : ""}
                <div class="exercise-actions">
                  <div class="variation-wrap">
                    <label>${t.variationLabel}</label>
                    <select class="variation-select" data-variation-select="${itemId}">
                      ${optionMarkup}
                    </select>
                  </div>
                  <button class="item-toggle ${done ? "is-done" : ""}" type="button" data-toggle-item="${itemId}">
                    ${done ? t.markExerciseUndo : t.markExerciseDone}
                  </button>
                </div>
              </div>
            `;

            card.addEventListener("click", () => openPreview({ name: selectedVariant.name, sets: exercise.sets, file: selectedVariant.file }, t));
            card.addEventListener("keydown", (event) => {
              if (event.key === "Enter" || event.key === " ") {
                event.preventDefault();
                openPreview({ name: selectedVariant.name, sets: exercise.sets, file: selectedVariant.file }, t);
              }
            });

            const variationSelect = card.querySelector("[data-variation-select]");
            if (variationSelect) {
              variationSelect.addEventListener("click", (event) => {
                event.stopPropagation();
              });
              variationSelect.addEventListener("change", (event) => {
                event.stopPropagation();
                setExerciseVariant(day.key, exercise, variationSelect.value);
              });
            }

            const itemToggle = card.querySelector("[data-toggle-item]");
            if (itemToggle) {
              itemToggle.addEventListener("click", (event) => {
                event.stopPropagation();
                toggleItemDone(day.key, itemId);
              });
            }

            grid.appendChild(card);
          }

          dayCard.appendChild(grid);
        }

        if (day.cardio) {
          const list = document.createElement("div");
          list.className = "cardio-list";

          for (let index = 0; index < day.cardio.length; index += 1) {
            const item = day.cardio[index];
            const itemId = `cardio:${index}`;
            const done = isItemDone(day.key, itemId);
            const row = document.createElement("article");
            row.className = `cardio-item ${done ? "is-complete" : ""}`;
            row.innerHTML = `
              <div>
                <div class="cardio-title">${t.cardio[item.title]}</div>
                <div class="cardio-sub">${t.cardio[item.detail]}</div>
              </div>
              <div class="duration">${t.durations[item.duration]}</div>
              <button class="item-toggle ${done ? "is-done" : ""}" type="button" data-toggle-item="${itemId}">
                ${done ? t.markExerciseUndo : t.markExerciseDone}
              </button>
            `;

            const itemToggle = row.querySelector("[data-toggle-item]");
            if (itemToggle) {
              itemToggle.addEventListener("click", () => {
                toggleItemDone(day.key, itemId);
              });
            }
            list.appendChild(row);
          }

          dayCard.appendChild(list);
        }

        if (day.tipKey) {
          const tip = document.createElement("div");
          tip.className = "tip";
          tip.textContent = `${t.tipLabel}: ${t.tips[day.tipKey]}`;
          dayCard.appendChild(tip);
        }

        planRoot.appendChild(dayCard);
      }

      setActiveButton(languageButtons, language, "data-lang");
    }

    function showFallback(img) {
      img.style.display = "none";
      const fallback = img.parentElement.querySelector(".fallback");
      if (fallback) {
        fallback.style.display = "flex";
      }
    }

    for (const button of languageButtons) {
      button.addEventListener("click", () => {
        const language = button.getAttribute("data-lang");
        localStorage.setItem("workout-language", language);
        renderPlan(language);
      });
    }

    themeToggleBtn.addEventListener("click", () => {
      applyTheme(currentTheme === "dark" ? "light" : "dark");
    });

    closePreviewBtn.addEventListener("click", closePreview);

    resetWeekBtn.addEventListener("click", () => {
      const t = translations[currentLanguage];
      if (confirm(t.resetConfirm)) {
        progressState = {};
        saveWeekProgress();
        renderPlan(currentLanguage);
      }
    });

    previewModal.addEventListener("click", (event) => {
      if (event.target === previewModal) {
        closePreview();
      }
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && previewModal.classList.contains("open")) {
        closePreview();
      }
    });


    const storedLanguage = localStorage.getItem("workout-language");
    const initialLanguage = storedLanguage && translations[storedLanguage] ? storedLanguage : "en";

    const storedTheme = localStorage.getItem("workout-theme");
    const initialTheme = storedTheme === "dark" ? "dark" : "light";

    currentWeekKey = getWeekKey();
    progressState = loadWeekProgress();
    exerciseChoices = loadExerciseChoices();

    applyTheme(initialTheme);
    renderPlan(initialLanguage);
  </script>
</body>
</html>
